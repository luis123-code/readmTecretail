<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tecretail ERP</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 0 auto; padding: 2rem; }
  </style>
</head>
<body>
  <div id="content">Cargando...</div>
  <script>
    let path = location.pathname;
    if (path === '/' || path === '') {
      path = '/docs/Tecretail/index.md';
    } else {
      path = '/docs/Tecretail' + path + '/index.md';
    }
    fetch(path)
      .then(r => {
        if (!r.ok) throw new Error('404');
        return r.text();
      })
      .then(md => document.getElementById('content').innerHTML = marked.parse(md))
      .catch(() => document.getElementById('content').innerHTML = '<h2>Página no encontrada</h2>');
  </script>
</body>
</html>
